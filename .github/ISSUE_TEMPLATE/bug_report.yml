name: Bug report / Reportar bug
description: Something isn't working as expected / Algo não funciona como esperado
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. For **security issues**, see [SECURITY.md](https://github.com/Seven-Panda-Labs/queima-asfalto/blob/main/SECURITY.md) — do not use this form.

        Obrigado pelo report. Para **problemas de segurança**, vê [SECURITY.md](https://github.com/Seven-Panda-Labs/queima-asfalto/blob/main/SECURITY.md).

  - type: textarea
    id: description
    attributes:
      label: What happened? / O que aconteceu?
      description: Clear description of the bug. / Descrição clara do problema.
      placeholder: When I … / Quando eu …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect? / O que esperavas?
      placeholder: I expected … / Esperava que …
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce / Passos para reproduzir
      placeholder: |
        1. Go to …
        2. Click …
        3. See error
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / Versão
      description: From `package.json` or app Settings, if self-hosting. / De `package.json` ou Definições da app.
      placeholder: "1.10.0"
    validations:
      required: false

  - type: dropdown
    id: environment
    attributes:
      label: Environment / Ambiente
      options:
        - Self-hosted / Self-hosting
        - Local dev (`npm run dev`) / Dev local
        - Not sure / Não sei
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Extra context / Contexto extra
      description: Screenshots, browser, OS, connector name, event URL, console errors. No real user PII. / Sem PII real.
      placeholder: Chrome 138, Android 15, connector Sportive Live, …
    validations:
      required: false
