<!doctype html>
<html lang="pt-PT">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#2563EB" />
    <meta name="color-scheme" content="light dark" />
    <script>
      ;(function () {
        try {
          var key = 'queima-asfalto:theme-guest'
          var stored = localStorage.getItem(key)
          var preference =
            stored === 'light' || stored === 'dark' || stored === 'system' ? stored : 'system'
          var dark =
            preference === 'dark' ||
            (preference === 'system' &&
              window.matchMedia &&
              window.matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.classList.toggle('dark', dark)
          document.documentElement.dataset.themePreference = preference
          document.documentElement.style.colorScheme = dark ? 'dark' : 'light'
          var meta = document.querySelector('meta[name="theme-color"]')
          if (meta) meta.setAttribute('content', dark ? '#121212' : '#2563EB')
        } catch (error) {
          /* ignore */
        }
      })()
    </script>
    <meta name="description" content="Gestão de época de corrida — eventos, objetivos e resultados." />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Queima Asfalto</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
